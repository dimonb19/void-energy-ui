name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Typecheck + registry drift
        run: npm run check

      - name: Unit tests
        run: npm run test

      - name: Token Law scan (advisory)
        run: npm run scan
        continue-on-error: true
